services:
  backend:
    build: ./backend
    container_name: prestanza-backend
    expose:
      - "8000"
    volumes:
      - ./backend/datos_actuales:/app/datos_actuales
      - ./backend/modelos_versionados:/app/modelos_versionados
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: prestanza-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
