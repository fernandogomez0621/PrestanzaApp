server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de /api hacia el backend (servicio 'backend' en la red de compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;        # el entrenamiento puede tardar
        proxy_connect_timeout 600s;
        client_max_body_size 100M;      # CSVs grandes
    }
}
